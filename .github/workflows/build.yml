name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build
      run: swift build
      continue-on-error: true
    
    - name: Check Swift syntax
      run: swiftlint --strict || true
      continue-on-error: true
